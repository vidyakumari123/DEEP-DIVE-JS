<svg width="920" height="480" viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Deep copy diagram</title>
  <desc id="desc">The original object and deep copy each point to their own separate nested address object.</desc>
  <rect width="920" height="480" fill="#f7fafc"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Deep Copy</text>
  <text x="460" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">The outer object and the nested object are both copied.</text>

  <rect x="70" y="116" width="250" height="140" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="195" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e40af">originalObject</text>
  <text x="100" y="188" font-family="Consolas, monospace" font-size="16" fill="#111827">name: "Vidya"</text>
  <text x="100" y="220" font-family="Consolas, monospace" font-size="16" fill="#111827">address: reference 1</text>

  <rect x="600" y="116" width="250" height="110" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="725" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">address object 1</text>
  <text x="650" y="192" font-family="Consolas, monospace" font-size="18" fill="#111827">city: "Mysore"</text>

  <rect x="70" y="306" width="250" height="110" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
  <text x="195" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5b21b6">deepCopy</text>
  <text x="100" y="378" font-family="Consolas, monospace" font-size="16" fill="#111827">address: reference 2</text>

  <rect x="600" y="306" width="250" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="725" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#065f46">address object 2</text>
  <text x="650" y="382" font-family="Consolas, monospace" font-size="18" fill="#111827">city: "Bangalore"</text>

  <path d="M320 210 C430 200 495 182 600 172" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M320 370 C430 370 500 364 600 362" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrowPurple)"/>

  <line x1="460" y1="98" x2="460" y2="432" stroke="#9ca3af" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="460" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">Changing originalObject.address.city does not change deepCopy.address.city.</text>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
