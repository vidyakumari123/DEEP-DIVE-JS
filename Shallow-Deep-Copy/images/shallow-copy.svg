<svg width="920" height="420" viewBox="0 0 920 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shallow copy diagram</title>
  <desc id="desc">The original object and shallow copy both point to the same nested address object.</desc>
  <rect width="920" height="420" fill="#f7fafc"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Shallow Copy</text>
  <text x="460" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">The outer object is copied, but the nested object is shared.</text>

  <rect x="70" y="118" width="250" height="140" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <text x="195" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1e40af">originalObject</text>
  <text x="100" y="190" font-family="Consolas, monospace" font-size="16" fill="#111827">name: "Vidya"</text>
  <text x="100" y="222" font-family="Consolas, monospace" font-size="16" fill="#111827">address: reference</text>

  <rect x="70" y="292" width="250" height="80" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
  <text x="195" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5b21b6">shallowCopy</text>
  <text x="100" y="354" font-family="Consolas, monospace" font-size="16" fill="#111827">address: same reference</text>

  <rect x="590" y="176" width="260" height="120" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="720" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#065f46">address object</text>
  <text x="640" y="252" font-family="Consolas, monospace" font-size="18" fill="#111827">city: "Mysore"</text>

  <path d="M320 214 C410 214 480 220 590 226" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M320 338 C430 338 485 286 590 258" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrowPurple)"/>

  <rect x="368" y="104" width="158" height="50" rx="25" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="447" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">Shared nested object</text>

  <text x="460" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">Changing originalObject.address.city also changes shallowCopy.address.city.</text>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
